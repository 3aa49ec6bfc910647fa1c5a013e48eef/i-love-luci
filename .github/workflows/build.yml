name: Build OpenWrt packages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-main-pr-source:
    name: Validate main PR source
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Require dev or uat source branch
        run: |
          case "${GITHUB_HEAD_REF}" in
            dev|uat)
              echo "Main PR source branch is ${GITHUB_HEAD_REF}"
              ;;
            *)
              echo "Pull requests into main must come from dev or uat, got ${GITHUB_HEAD_REF}" >&2
              exit 1
              ;;
          esac

  build:
    name: OpenWrt ${{ matrix.openwrt_version }} ${{ matrix.openwrt_target }} ${{ matrix.package_format }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: 24.10.7
            openwrt_target: rockchip/armv8
            target_slug: rockchip-armv8
            package_format: ipk
          - openwrt_version: 24.10.7
            openwrt_target: ramips/mt7621
            target_slug: ramips-mt7621
            package_format: ipk
          - openwrt_version: 24.10.7
            openwrt_target: mediatek/filogic
            target_slug: mediatek-filogic
            package_format: ipk
          - openwrt_version: 24.10.7
            openwrt_target: ipq40xx/generic
            target_slug: ipq40xx-generic
            package_format: ipk
          - openwrt_version: 24.10.7
            openwrt_target: ath79/generic
            target_slug: ath79-generic
            package_format: ipk
          - openwrt_version: 24.10.7
            openwrt_target: x86/64
            target_slug: x86-64
            package_format: ipk
          - openwrt_version: 25.12.4
            openwrt_target: rockchip/armv8
            target_slug: rockchip-armv8
            package_format: apk
          - openwrt_version: 25.12.4
            openwrt_target: ramips/mt7621
            target_slug: ramips-mt7621
            package_format: apk
          - openwrt_version: 25.12.4
            openwrt_target: mediatek/filogic
            target_slug: mediatek-filogic
            package_format: apk
          - openwrt_version: 25.12.4
            openwrt_target: ipq40xx/generic
            target_slug: ipq40xx-generic
            package_format: apk
          - openwrt_version: 25.12.4
            openwrt_target: ath79/generic
            target_slug: ath79-generic
            package_format: apk
          - openwrt_version: 25.12.4
            openwrt_target: x86/64
            target_slug: x86-64
            package_format: apk

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: applications/luci-app-i-love-luci/frontend/shell/package-lock.json

      - name: Set package channel
        id: package-channel
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "release=" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "release=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "channel=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            openssl \
            python3 \
            python3-distutils \
            rsync \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      - name: Cache OpenWrt SDK archive
        uses: actions/cache@v5
        with:
          path: build/sdk-ci/*.tar.zst
          key: openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target_slug }}

      - name: Build package
        env:
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
          OPENWRT_TARGET: ${{ matrix.openwrt_target }}
          PACKAGE_FORMAT: ${{ matrix.package_format }}
          PACKAGE_SPECS: luci-theme-i-love-luci:themes/luci-theme-i-love-luci luci-app-i-love-luci:applications/luci-app-i-love-luci i-love-luci-console:utils/i-love-luci-console
          PACKAGE_RELEASE: ${{ steps.package-channel.outputs.release }}
          APK_SIGNING_KEY: ${{ secrets.ILOVE_LUCI_APK_SIGNING_KEY }}
          REQUIRE_APK_SIGNING: ${{ github.ref_name == 'main' && matrix.package_format == 'apk' }}
          JOBS: 1
        run: scripts/build-openwrt-package.sh

      - name: Upload package feed artifact
        uses: actions/upload-artifact@v7
        with:
          name: i-love-luci-${{ steps.package-channel.outputs.channel }}-${{ matrix.openwrt_version }}-${{ matrix.target_slug }}-${{ matrix.package_format }}
          path: dist/openwrt/${{ matrix.openwrt_version }}/${{ matrix.target_slug }}/
          if-no-files-found: error

  required-24-10:
    name: OpenWrt 24.10.7 ipk
    runs-on: ubuntu-22.04
    needs: build
    if: always()

    steps:
      - name: Require all 24.10.7 package builds
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more OpenWrt package builds failed." >&2
            exit 1
          fi

  required-25-12:
    name: OpenWrt 25.12.4 apk
    runs-on: ubuntu-22.04
    needs: build
    if: always()

    steps:
      - name: Require all 25.12.4 package builds
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more OpenWrt package builds failed." >&2
            exit 1
          fi

  publish-pages:
    name: Publish package feed
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Download package feed artifacts
        uses: actions/download-artifact@v8
        with:
          path: page-artifacts
          pattern: i-love-luci-stable-*

      - name: Prepare public feed site
        run: python3 scripts/prepare-public-feed.py page-artifacts public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'main'

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: v1.0.0-r8
      RELEASE_NAME: I Love LuCI 1.0.0-r8

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download package feed artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: i-love-luci-stable-*

      - name: Prepare release assets
        run: |
          set -euo pipefail

          python3 scripts/prepare-release-assets.py release-artifacts release-upload
          test "$(find release-upload -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 12
          test "$(find release-upload -maxdepth 1 -type f -name '*.apk' | wc -l)" -eq 18
          test "$(find release-upload -maxdepth 1 -type f -name '*.ipk' | wc -l)" -eq 18

          cat > release-notes.md <<'EOF'
          Stable I Love LuCI package release for OpenWrt 24.10.7 and 25.12.4.

          Public package feeds are grouped by OpenWrt release and OpenWrt package architecture. OpenWrt 25.12 apk feeds are signed; install the published `i-love-luci-apk-public-key.pem` into `/etc/apk/keys/` before adding the feed.

          Install from the published package feed where possible. Manual installs must install both packages:

          - `i-love-luci-console`
          - `luci-theme-i-love-luci`
          - `luci-app-i-love-luci`

          The console helper provides the same-origin authenticated console tunnel used by the React shell.
          EOF

          find release-upload -maxdepth 1 -type f -print | sort

      - name: Update GitHub Release
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_NAME}" \
              --notes-file release-notes.md \
              --latest
          fi

          while IFS= read -r asset; do
            gh release delete-asset "${RELEASE_TAG}" "${asset}" -y
          done < <(
            gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' |
              grep -E '^(i-love-luci-console|luci-theme-i-love-luci|luci-app-i-love-luci|i-love-luci-apk-public-key|i-love-luci-stable-)' || true
          )

          gh release upload "${RELEASE_TAG}" release-upload/* --clobber
